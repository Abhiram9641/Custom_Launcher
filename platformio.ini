[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

board_build.partitions = partitions.csv

; --- Flash config for ESP32-S3-N16R8 ---
board_build.flash_size = 16MB
board_build.flash_mode = qio

; --- Custom bootloader hook ---
; ESP-IDF automatically compiles any component inside bootloader_components/
; at the bootloader build stage. Our boot_gpio_hook lives there.
board_build.bootloader_custom_commands = -DBOOTLOADER_COMPONENTS_DIR="${PROJECT_DIR}/bootloader_components"

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Icon asset pipeline: runs convert_icons.py before every build.
; Converts icons/*.png → src/assets/icons/*.h (RGB565 C arrays).
; Install dependency once: pip install Pillow
extra_scripts = pre:convert_icons.py

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.12